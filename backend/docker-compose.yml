version: "3.9"

services:
  # --- PostgreSQL (local development) ---
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: scanberry
      POSTGRES_USER: scanberry
      POSTGRES_PASSWORD: scanberry_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanberry -d scanberry"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Backend API ---
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://scanberry:scanberry_dev@db:5432/scanberry
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/storage
      DEVICE: cpu
      LOG_LEVEL: INFO
      # Mount model weights from host
      MODEL_DETECTION_PATH: /models/detection/best_model_Yolo.pt
      MODEL_CLASSIFICATION_PATH: /models/classification/best_model_EfficientNet.pt
      MODEL_SEGMENTATION_BUSH_PATH: /models/segmentation/best_model_U-Net.pth
      MODEL_SEGMENTATION_LESION_PATH: /models/segmentation/best_model_DeepLab.pth
    volumes:
      - ./storage:/app/storage
      - ../models:/models:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
